<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — MARATU Estúdio</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    @font-face { font-family: 'Jack'; src: url('TRYJackAlpha-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'Clother'; src: url('TRYClother-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'Clother'; src: url('TRYClother-Bold.ttf') format('truetype'); font-weight: 700; }
    @font-face { font-family: 'Clother'; src: url('TRYClother-Black.ttf') format('truetype'); font-weight: 900; }

    :root {
      --laranja: #C8501A;
      --azul: #0E3272;
      --areia: #F0ECE4;
      --preto: #0D0D0B;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: 'Clother', sans-serif; background: var(--preto); overflow: hidden; }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: url('mangue.jpg') center center / cover no-repeat;
      opacity: 0.12;
    }

    .container {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }

    .logo { margin-bottom: 48px; }
    .logo img { height: 48px; width: 48px; border-radius: 50%; mix-blend-mode: screen; }

    .tag {
      font-family: 'Space Mono', monospace; font-size: 0.55rem;
      color: var(--laranja); letter-spacing: 0.25em; text-transform: uppercase;
      margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
      justify-content: center;
    }
    .tag::before, .tag::after { content: ''; display: block; width: 20px; height: 1px; background: var(--laranja); }

    .numero {
      font-family: 'Jack', sans-serif;
      font-size: clamp(6rem, 20vw, 16rem);
      color: var(--laranja); line-height: 0.85;
      margin-bottom: 8px; display: block;
      opacity: 0.15;
      position: absolute;
      left: 50%; transform: translateX(-50%);
      white-space: nowrap; pointer-events: none;
      top: 50%; margin-top: -0.6em;
    }

    .titulo {
      font-family: 'Clother', sans-serif; font-weight: 900;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      color: var(--areia); line-height: 1.1; margin-bottom: 12px;
      position: relative; z-index: 3;
    }

    .sub {
      font-size: 1rem; color: rgba(240,236,228,0.45);
      line-height: 1.7; margin-bottom: 48px; max-width: 400px;
      position: relative; z-index: 3;
    }

    .acoes {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      position: relative; z-index: 3;
    }

    .btn-home {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 28px; background: var(--laranja);
      font-family: 'Clother', sans-serif; font-weight: 900;
      font-size: 0.9rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--preto); text-decoration: none;
      border-radius: 999px; transition: background 0.2s;
    }
    .btn-home:hover { background: var(--areia); }

    .btn-loja {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 28px; background: transparent;
      font-family: 'Clother', sans-serif; font-weight: 900;
      font-size: 0.9rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--areia); text-decoration: none;
      border: 1px solid rgba(240,236,228,0.2);
      border-radius: 999px; transition: all 0.2s;
    }
    .btn-loja:hover { border-color: var(--laranja); color: var(--laranja); }

    .rodape {
      position: absolute; bottom: 28px;
      font-family: 'Space Mono', monospace; font-size: 0.48rem;
      color: rgba(240,236,228,0.15); letter-spacing: 0.1em; text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .acoes { flex-direction: column; width: 100%; max-width: 280px; }
      .btn-home, .btn-loja { justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <span class="numero">404</span>

  <div class="container">
    <div class="logo">
      <a href="index.html"><img src="logo-redondo.png" alt="MARATU Estúdio"></a>
    </div>

    <p class="tag">Erro 404</p>
    <h1 class="titulo">Ops, Maratuzinho.<br>Acho que você se perdeu, hein?</h1>
    <p class="sub">Essa página não existe — mas a loja está aberta e o mangue continua lindo.</p>

    <div class="acoes">
      <a href="index.html" class="btn-home">← Voltar ao início</a>
      <a href="loja.html" class="btn-loja">Ver a loja ↗</a>
    </div>

    <p class="rodape">MARATU Estúdio · Aracaju, SE · EST. 2026</p>
  </div>

</body>
</html>
