<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter — MARATU Estúdio</title>
  <meta name="description" content="Inscreva-se na newsletter da MARATU e receba lançamentos, bastidores e drops exclusivos direto do estúdio.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: 'Clother'; src: url('TRYClother-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'Clother'; src: url('TRYClother-Bold.ttf') format('truetype'); font-weight: 700; }
    @font-face { font-family: 'Clother'; src: url('TRYClother-Black.ttf') format('truetype'); font-weight: 900; }
    :root { --laranja: #C8501A; --azul: #0E3272; --areia: #F0ECE4; --preto: #0D0D0B; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: 'Clother', sans-serif; }
    .bg { position: fixed; inset: 0; z-index: 0; background: url('foto-atalaia.jpg') center center / cover no-repeat; }
    .bg::after { content: ''; position: absolute; inset: 0; background: rgba(13,13,11,0.72); }
    .bg-laranja { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1; height: 35vh; background: linear-gradient(to top, rgba(200,80,26,0.45) 0%, transparent 100%); pointer-events: none; }
    .container { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 60px 48px; max-width: 680px; }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 56px; }
    .logo img { height: 36px; width: 36px; border-radius: 50%; mix-blend-mode: screen; }
    .logo-nome { font-family: 'Clother', sans-serif; font-weight: 900; font-size: 0.85rem; color: rgba(240,236,228,0.6); letter-spacing: 0.1em; text-transform: uppercase; }
    .tag { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: var(--laranja); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .tag::before { content: ''; display: block; width: 24px; height: 1px; background: var(--laranja); }
    .titulo { font-family: 'Clother', sans-serif; font-weight: 900; font-size: clamp(2.8rem, 6vw, 5.5rem); color: var(--areia); line-height: 0.95; margin-bottom: 24px; }
    .titulo span { color: var(--laranja); }
    .subtitulo { font-size: 1.05rem; color: rgba(240,236,228,0.6); line-height: 1.75; margin-bottom: 48px; max-width: 480px; }
    .form { display: flex; flex-direction: column; gap: 12px; max-width: 440px; }
    .input { width: 100%; padding: 18px 20px; background: rgba(240,236,228,0.08); border: 1px solid rgba(240,236,228,0.2); font-family: 'Clother', sans-serif; font-size: 1rem; color: var(--areia); outline: none; border-radius: 0 8px 0 0; transition: border-color 0.2s; }
    .input::placeholder { color: rgba(240,236,228,0.3); }
    .input:focus { border-color: var(--laranja); background: rgba(240,236,228,0.12); }
    .btn-submit { width: 100%; padding: 18px; background: var(--laranja); border: none; font-family: 'Clother', sans-serif; font-weight: 900; font-size: 1rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--areia); cursor: pointer; border-radius: 0 12px 0 0; transition: background 0.2s; }
    .btn-submit:hover { background: var(--areia); color: var(--preto); }
    .msg-sucesso { display: none; padding: 20px; border-left: 3px solid var(--laranja); font-family: 'Clother', sans-serif; font-weight: 700; font-size: 1rem; color: var(--areia); line-height: 1.6; background: rgba(200,80,26,0.1); }
    .msg-erro { display: none; font-size: 0.82rem; color: var(--laranja); font-family: 'Space Mono', monospace; margin-top: 4px; }
    .rodape { margin-top: 48px; font-family: 'Space Mono', monospace; font-size: 0.48rem; color: rgba(240,236,228,0.2); letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 20px; }
    .rodape a { color: rgba(240,236,228,0.35); text-decoration: none; transition: color 0.2s; }
    .rodape a:hover { color: var(--laranja); }
    @media (max-width: 600px) { .container { padding: 48px 24px; } .titulo { font-size: clamp(2.2rem, 10vw, 3.5rem); } }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-laranja"></div>
  <div class="container">
    <div class="logo">
      <img src="logo-redondo.png" alt="MARATU Estúdio">
      <span class="logo-nome">MARATU Estúdio</span>
    </div>
    <p class="tag">Newsletter</p>
    <h1 class="titulo">Descubra <span>primeiro.</span></h1>
    <p class="subtitulo">Lançamentos, bastidores e drops exclusivos direto do estúdio pra você.</p>
    <form class="form" id="nl-form">
      <input type="email" class="input" id="nl-email" placeholder="seu@email.com" required>
      <button type="submit" class="btn-submit" id="nl-btn">Quero me inscrever</button>
      <p class="msg-erro" id="nl-erro"></p>
    </form>
    <div class="msg-sucesso" id="nl-sucesso">
      Inscrito! Bem-vindo à MARATU.<br>
      <span style="font-weight:400;font-size:0.9rem;color:rgba(240,236,228,0.55);">Fique de olho no seu email.</span>
    </div>
    <div class="rodape">
      <span>MARATU Estúdio · Aracaju, SE · EST. 2026</span>
      <a href="index.html">← Voltar ao site</a>
    </div>
  </div>
  <script>
    var WORKER_URL = 'https://maratu-newsletter.raphaelnascimento.workers.dev';
    document.getElementById('nl-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('nl-email').value;
      var btn = document.getElementById('nl-btn');
      var erro = document.getElementById('nl-erro');
      var sucesso = document.getElementById('nl-sucesso');
      btn.textContent = 'Inscrevendo...';
      btn.disabled = true;
      erro.style.display = 'none';
      fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
      }).then(function(res) {
        if (res.ok) {
          document.getElementById('nl-form').style.display = 'none';
          sucesso.style.display = 'block';
        } else {
          erro.style.display = 'block';
          erro.textContent = 'Algo deu errado, tente novamente.';
          btn.textContent = 'Quero me inscrever';
          btn.disabled = false;
        }
      }).catch(function() {
        erro.style.display = 'block';
        erro.textContent = 'Erro de conexão, tente novamente.';
        btn.textContent = 'Quero me inscrever';
        btn.disabled = false;
      });
    });
  </script>
</body>
</html>
